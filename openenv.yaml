      name: Conflict-Safe Client Intake
      difficulty: easy
      max_steps: 16
    - id: task_2
      name: Privilege Review Under Litigation Pressure
      difficulty: medium
      max_steps: 24
    - id: task_3
      name: Litigation Incident Command
      difficulty: hard
      max_steps: 20
