description: >
  LexCrisis is an OpenEnv benchmark for legal operations incident response during
  high-stakes pharmaceutical product-liability litigation. It evaluates conflict
  screening, privilege review, and multi-front litigation triage under deadline,
  ethics, and privilege-waiver constraints.
metadata:
